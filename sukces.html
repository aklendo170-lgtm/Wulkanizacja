<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wysłano pomyślnie | JARVIS SERWIS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #0a0a0c;      
            --accent: #d9692b;       
            --accent-glow: rgba(217, 105, 43, 0.4);
            --text-light: #f4f4f5;   
            --text-muted: #a0a0ab;   
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-light); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }

        .success-container {
            background: rgba(20, 20, 23, 0.8);
            padding: 60px 40px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .success-container::before {
            content: ''; 
            position: absolute; 
            top: -50%; 
            left: 50%; 
            transform: translateX(-50%);
            width: 200px; 
            height: 200px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            z-index: 0;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--accent);
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .btn { 
            background: var(--accent); 
            color: white; 
            padding: 14px 35px; 
            text-decoration: none; 
            font-weight: 700; 
            border-radius: 30px; 
            transition: all 0.3s; 
            display: inline-block; 
            font-family: 'Montserrat', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            box-shadow: 0 4px 15px var(--accent-glow);
            position: relative;
            z-index: 1;
        }
        .btn:hover { 
            background: #e67e00; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 25px rgba(217, 105, 43, 0.6); 
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon">✅</div>
        <h1>Zgłoszenie <span>Wysłane</span></h1>
        <p>Dziękujemy! Otrzymaliśmy Twoją wiadomość. Nasz zespół przeanalizuje usterkę i skontaktujemy się z Tobą najszybciej jak to możliwe.</p>
        <a href="index.html" class="btn">WRÓĆ NA STRONĘ GŁÓWNĄ</a>
    </div>

</body>
</html>
